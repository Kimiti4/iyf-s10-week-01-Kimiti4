<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | Amos Kimiti</title>
  <style>
    nav ul {
  list-style: none;
  padding: 0;
  margin: 0;
  display: flex;
  gap: 12px;
}

nav a {
  text-decoration: none;
  padding: 6px 10px;
  border-radius: 6px;
}

nav a[aria-current="page"] {
  font-weight: bold;
  text-decoration: underline;
}
  </style>
 
</head>

<body style="background-color: #877cec; color: #000;">
  <header class="container">
    <nav aria-label="Primary navigation">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="projects.html">Projects</a></li>
        <li><a href="contact.html" aria-current="page">Contact</a></li>
      </ul>
    </nav>
    <h1 style="color: darkblue; font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;">Contact</h1>
    <p class="hint">Send me a message using the form below.</p>
  </header>

  <main class="container">
    <!-- Fully functional form (HTML validation + submit) -->
    <form action="#" method="post">
      <fieldset>
        <legend>Contact details</legend>

        <div class="row">
          <div>
            <label for="fullName">Full Name <span aria-hidden="true">*</span></label>
            <input
              id="fullName"
              name="fullName"
              type="text"
              required
              placeholder="e.g., Amos Kimiti"
              autocomplete="name"
            />
          </div>

          <div>
            <label for="email">Email <span aria-hidden="true">*</span></label>
            <input
              id="email"
              name="email"
              type="email"
              required
              placeholder="e.g., karamos473@gmail.com"
              autocomplete="email"
            />
          </div>
        </div>

        <div class="row">
          <div>
            <label for="phone">Phone (optional)</label>
            <input
              id="phone"
              name="phone"
              type="tel"
              placeholder="e.g., +254 705 212 543"
              autocomplete="tel"
            />
          </div>

          <div>
            <label for="subject">Subject</label>
            <select id="subject" name="subject">
              <option value="collaboration">Collaboration</option>
              <option value="questions">Questions</option>
              <option value="feedback">Feedback</option>
            </select>
          </div>
        </div>
      </fieldset>

      <fieldset>
        <legend>Your message</legend>

        <div>
          <label for="message">Message <span aria-hidden="true">*</span></label>
          <textarea
            id="message"
            name="message"
            required
            minlength="50"
            placeholder="Write at least 50 characters…"
          ></textarea>
          <p class="hint">Minimum 50 characters.</p>
        </div>

        <div class="inline">
          <input id="newsletter" name="newsletter" type="checkbox" />
          <label for="newsletter">Subscribe to my newsletter</label>
        </div>
      </fieldset>

      <button type="submit" style="background-color: darkblue; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer;">Submit</button>
    </form>

    <section aria-labelledby="more-ways">

      <h2 id="more-ways" style="color: darkblue; font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;">Other ways to reach me</h2>
      <ul>
        <li>Email: <a href="mailto:karamos473@gmail.com">karamos473@gmail.com</a></li>
        <li>Location: Nairobi, Kenya (Africa/Nairobi)</li>
        <li>Social:
          <a href="https://github.com/Kimiti4" target="_blank" rel="noopener noreferrer">GitHub profile</a>
          
        </li>
      </ul>
      
    </section>
  </main>

  <footer class="container" style="text-align: center; padding: 20px; font-size: 0.9em; color: #555;">
    <p>© 2026 Amos Kimiti</p>
  </footer>
</body>
</html>
